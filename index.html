<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互动体验集合馆</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: #020617;
            color: #f8fafc;
            overflow: hidden;
            height: 100vh;
        }

        .portal-container {
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
        }

        .entry-card {
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .entry-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: rgba(59, 130, 246, 0.5);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .card-bg {
            position: absolute;
            inset: 0;
            opacity: 0.2;
            transition: opacity 0.5s;
            z-index: 0;
        }

        .entry-card:hover .card-bg {
            opacity: 0.4;
        }

        .floating {
            animation: floating 3s ease-in-out infinite;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .gradient-text {
            background: linear-gradient(135deg, #60a5fa 0%, #a855f7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="portal-container flex flex-col items-center justify-center p-6">

    <!-- 标题区域 -->
    <header class="text-center mb-12 animate-fade-in">
        <h1 class="text-3xl md:text-5xl font-black mb-4 tracking-tight">H-W-H<span class="gradient-text">的探索互动实验室</span></h1>
        <p class="text-slate-400 text-sm md:text-base">选择一个维度进入沉浸式互动体验</p>
    </header>

    <!-- 入口集合 -->
    <main class="grid grid-cols-1 md:grid-cols-2 gap-8 w-full max-w-4xl">
        
        <!-- 入口 1: 足球测试 -->
        <a href="https://hailooloo.github.io/FootballerTest/" target="_blank" class="entry-card group bg-slate-900/50 backdrop-blur-xl rounded-3xl p-8 flex flex-col items-center text-center">
            <div class="card-bg bg-[url('https://images.unsplash.com/photo-1574629810360-7efbbe195018?auto=format&fit=crop&q=80&w=500')] bg-cover"></div>
            <div class="relative z-10">
                <div class="w-20 h-20 bg-blue-500/20 rounded-2xl flex items-center justify-center mb-6 mx-auto group-hover:bg-blue-500/30 transition-colors">
                    <span class="text-5xl floating">⚽</span>
                </div>
                <h2 class="text-2xl font-bold mb-3">球星性格匹配</h2>
                <p class="text-slate-400 text-sm leading-relaxed mb-6">
                    通过 6 道专业心理测试题，精准匹配与你灵魂共鸣的现役足球巨星。
                </p>
                <div class="inline-flex items-center text-blue-400 font-bold group-hover:translate-x-2 transition-transform">
                    开启测试 <span class="ml-2">→</span>
                </div>
            </div>
        </a>

        <!-- 入口 2: 粒子模拟 -->
        <!-- 注意：这里的 href 指向粒子系统的 html 文件名 -->
        <a href="https://hailooloo.github.io/Particals/" target="_blank" class="entry-card group bg-slate-900/50 backdrop-blur-xl rounded-3xl p-8 flex flex-col items-center text-center">
            <div class="card-bg bg-[url('https://images.unsplash.com/photo-1550684848-fac1c5b4e853?auto=format&fit=crop&q=80&w=500')] bg-cover"></div>
            <div class="relative z-10">
                <div class="w-20 h-20 bg-purple-500/20 rounded-2xl flex items-center justify-center mb-6 mx-auto group-hover:bg-purple-500/30 transition-colors">
                    <span class="text-5xl floating" style="animation-delay: 0.5s;">✨</span>
                </div>
                <h2 class="text-2xl font-bold mb-3">物理粒子模拟</h2>
                <p class="text-slate-400 text-sm leading-relaxed mb-6">
                    感受重力、摩擦力与引力的交织。支持点击交互、碰撞回弹与指尖引力。
                </p>
                <div class="inline-flex items-center text-purple-400 font-bold group-hover:translate-x-2 transition-transform">
                    进入实验室 <span class="ml-2">→</span>
                </div>
            </div>
        </a>
     <!-- 入口 3: 暂空 -->
        <!-- 注意：这里的 href 指向“暂空，百度” html 文件名 -->
        <a href="https://baidu.com" target="_blank" class="entry-card group bg-slate-900/50 backdrop-blur-xl rounded-3xl p-8 flex flex-col items-center text-center">
            <div class="card-bg bg-[url('https://images.unsplash.com/photo-1711900922350-10523fb0b268?auto=format&fit=crop&q=80&w=500')] bg-cover"></div>
            <div class="relative z-10">
                <div class="w-20 h-20 bg-yellow-500/20 rounded-2xl flex items-center justify-center mb-6 mx-auto group-hover:bg-purple-500/30 transition-colors">
                    <span class="text-5xl floating" style="animation-delay: 0.5s;">🌈</span>
                </div>
                <h2 class="text-2xl font-bold mb-3">暂空，百度</h2>
                <p class="text-slate-400 text-sm leading-relaxed mb-6">
                    暂空，百度暂空，百度暂空，百度暂空，百度暂空，百度暂空，百度。
                </p>
                <div class="inline-flex items-center text-yellow-400 font-bold group-hover:translate-x-2 transition-transform">
                    进入暂空，百度 <span class="ml-2">→</span>
                </div>
            </div>
        </a>
    </main>

    <!-- 页脚 -->
    <footer class="mt-16 text-slate-600 text-xs">
        © 2024 Interactive Lab. All Rights Reserved.
    </footer>

</body>
</html>
